<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chu-Chu-Wah | En Construcción</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rojo: #C0001A;
            --rojo-oscuro: #8B0010;
            --amarillo: #FFD700;
            --oscuro: #0F0F0F;
            --gris: #1A1A1A;
            --blanco: #FFFFFF;
            --crema: #FFF8E7;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--oscuro);
            color: var(--blanco);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        .construction-container {
            max-width: 800px;
            padding: 40px;
            background: rgba(15, 15, 15, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(192, 0, 26, 0.2);
        }
        .construction-logo {
            max-width: 200px;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.5));
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .construction-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(48px, 8vw, 80px);
            color: var(--amarillo);
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 6px rgba(255, 215, 0, 0.3);
        }
        .construction-message {
            font-size: 18px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 30px;
        }
        .construction-progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 30px 0;
            overflow: hidden;
        }
        .construction-progress-bar {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, var(--rojo), var(--amarillo));
            border-radius: 3px;
            animation: progress 3s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 50%; }
            50% { width: 70%; }
            100% { width: 50%; }
        }
        .construction-contact {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .construction-contact p {
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        .construction-contact a {
            color: var(--amarillo);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .construction-contact a:hover {
            color: var(--rojo);
            text-decoration: underline;
        }
        .construction-footer {
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }
        @media (max-width: 600px) {
            .construction-container {
                padding: 20px;
                margin: 0 10px;
            }
            .construction-logo {
                max-width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="construction-container">
        <img src="logo.png" alt="ChuChuWah Logo" class="construction-logo">
        <h1 class="construction-title">EN CONSTRUCCIÓN</h1>
        <p class="construction-message">
            ¡Estamos trabajando para ofrecerte lo mejor!<br>
            Próximamente podrás disfrutar de nuestros platos más pedidos en esta sección.
        </p>
        <div class="construction-progress">
            <div class="construction-progress-bar"></div>
        </div>
        <div class="construction-contact">
            <p>¿Tienes prisa? Contáctanos por:</p>
            <p><a href="tel:47874242">📞 47874242</a></p>
            <p><a href="https://wa.me/5350993981" target="_blank">📲 WhatsApp +53 50993981</a></p>
        </div>
        <div class="construction-footer">
            © 2026 Restaurante ChuChuWah · Jaruco, Cuba
        </div>
    </div>
</body>
</html>
